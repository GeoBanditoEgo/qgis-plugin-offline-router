<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" width="100" height="115">

  <!--
    Large GREEN pin  — centre (28, 58), body radius ~18, tail tip ~82
    Small RED pin    — centre (72, 28), body radius ~12, tail tip ~46
    Route connects   — from (28, 82) to (72, 46) with a curvy wavy path
  -->

  <!-- ── Wavy purple route ─────────────────────────────────────────── -->
  <!-- First wave: swings right -->
  <path d="M 28 82
           C 22 74, 18 66, 28 60
           C 38 54, 42 46, 36 38
           C 30 30, 26 24, 34 18
           C 42 12, 58 12, 66 18
           C 74 24, 78 32, 72 46"
        stroke="#7B2FBE" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- ── Large GREEN pin ───────────────────────────────────────────── -->
  <!-- Tail -->
  <path d="M 18 65 Q 28 84 38 65"
        fill="#2DBF4E" stroke="#1A8A35" stroke-width="1.5"/>
  <!-- Body circle -->
  <circle cx="28" cy="53" r="18"
          fill="#2DBF4E" stroke="#1A8A35" stroke-width="2"/>
  <!-- Inner white ring -->
  <circle cx="28" cy="53" r="9"
          fill="white" opacity="0.85"/>

  <!-- ── Small RED pin ─────────────────────────────────────────────── -->
  <!-- Tail -->
  <path d="M 63 37 Q 72 48 81 37"
        fill="#E03333" stroke="#A01818" stroke-width="1.2"/>
  <!-- Body circle -->
  <circle cx="72" cy="28" r="12"
          fill="#E03333" stroke="#A01818" stroke-width="1.5"/>
  <!-- Inner white ring -->
  <circle cx="72" cy="28" r="6"
          fill="white" opacity="0.85"/>

</svg>
